<svg width="320" height="100" viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg">
  <!-- NewGen Drafts — Concept 2 Geometric Bracket Logo -->
  <!-- Horizontal lockup version — use this in your website nav -->

  <!-- ICON: dark square with corner bracket marks and N -->
  <rect x="0" y="8" width="84" height="84" rx="5" fill="#1a2535"/>

  <!-- Corner bracket — top left (bold, primary) -->
  <line x1="0" y1="30" x2="0" y2="8" stroke="#c8401f" stroke-width="3.5" stroke-linecap="square"/>
  <line x1="0" y1="8" x2="22" y2="8" stroke="#c8401f" stroke-width="3.5" stroke-linecap="square"/>

  <!-- Corner bracket — bottom right (bold, primary) -->
  <line x1="84" y1="70" x2="84" y2="92" stroke="#c8401f" stroke-width="3.5" stroke-linecap="square"/>
  <line x1="84" y1="92" x2="62" y2="92" stroke="#c8401f" stroke-width="3.5" stroke-linecap="square"/>

  <!-- Corner bracket — top right (thin, secondary) -->
  <line x1="62" y1="8" x2="84" y2="8" stroke="#c8401f" stroke-width="1.8" stroke-linecap="square" opacity="0.45"/>
  <line x1="84" y1="8" x2="84" y2="30" stroke="#c8401f" stroke-width="1.8" stroke-linecap="square" opacity="0.45"/>

  <!-- Corner bracket — bottom left (thin, secondary) -->
  <line x1="22" y1="92" x2="0" y2="92" stroke="#c8401f" stroke-width="1.8" stroke-linecap="square" opacity="0.45"/>
  <line x1="0" y1="92" x2="0" y2="70" stroke="#c8401f" stroke-width="1.8" stroke-linecap="square" opacity="0.45"/>

  <!-- Bold geometric N letterform -->
  <path d="M18 23 L18 77 L28 77 L62 37 L62 77 L72 77 L72 23 L62 23 L28 63 L28 23 Z" fill="#ffffff"/>

  <!-- Small red accent bar top-right of icon -->
  <rect x="54" y="8" width="30" height="7" rx="1" fill="#c8401f"/>

  <!-- WORDMARK -->
  <!-- NEW — small, letter-spaced, red -->
  <text x="100" y="38" font-family="'Syne', Georgia, serif" font-size="14" font-weight="700" fill="#c8401f" letter-spacing="5">NEW</text>
  <!-- GEN — large, dark -->
  <text x="97" y="76" font-family="'Syne', Georgia, serif" font-size="46" font-weight="800" fill="#1a2535" letter-spacing="-1.5">GEN</text>

  <!-- Vertical rule divider -->
  <line x1="196" y1="28" x2="196" y2="88" stroke="#1a2535" stroke-width="1" opacity="0.15"/>

  <!-- Right side: DRAFTS + descriptor -->
  <text x="207" y="56" font-family="'DM Sans', sans-serif" font-size="18" font-weight="500" fill="#1a2535" letter-spacing="3.5">DRAFTS</text>
  <text x="207" y="74" font-family="'DM Sans', sans-serif" font-size="9.5" font-weight="400" fill="#1a2535" opacity="0.38" letter-spacing="1.8">ENGINEERING · UK</text>

  <!-- Bottom red rule -->
  <line x1="97" y1="86" x2="318" y2="86" stroke="#c8401f" stroke-width="2.5"/>
  <rect x="97" y="89.5" width="72" height="3" rx="1" fill="#c8401f" opacity="0.22"/>
</svg>
